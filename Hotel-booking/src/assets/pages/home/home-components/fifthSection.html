<section class="fifth-section">
  <h2 class="section-titles">Contact Us</h2>
  <div class="form-map-wrapper">
    <form action="" id="message-form">
      <input type="text" name="Iname" placeholder="Your Name" required />
      <input type="email" name="Iemail" placeholder="Your Email" required />
      <input type="tel" name="Itel" placeholder="Phone Number (Optional)" />
      <textarea
        name="message"
        id="message"
        cols="30"
        rows="5"
        placeholder="Your Message"
        required
      ></textarea>
      <button type="submit" class="send-message-button">Send Message</button>
    </form>
    <iframe
      src="https://www.google.com/maps?q=Tokyo,Japan&output=embed"
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
    >
    </iframe>
  </div>
</section>
